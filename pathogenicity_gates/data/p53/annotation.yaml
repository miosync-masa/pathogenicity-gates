# ═══════════════════════════════════════════════════════════════
# p53 (TP53_HUMAN) — Gate & Channel annotation
# ═══════════════════════════════════════════════════════════════
# Source:       UniProt P04637 (canonical, 393 aa)
# Framework:    pathogenicity-gates v0.2.0
# Generated:    2026-04-23 (Phase 2)
# Verification: Matches legacy v18 FINAL byte-for-byte
#
# IMPORTANT:
#   - Residue positions use UniProt canonical numbering (1-indexed)
#   - WT amino acids are NOT written in this file for SLIM critical
#     positions; they are extracted from p53_sequence.json (UniProt
#     canonical sequence).
#   - PTM entries include 'aa' for informational/verification purposes
#     (matched against sequence via verify_ptm_consistency script).

protein:
  name: TP53
  uniprot: P04637
  description: "Cellular tumor antigen p53 (tumor suppressor)"

# ═══════════════════════════════════════════════════════════════
# Structures
# ═══════════════════════════════════════════════════════════════
structures:
  primary:
    pdb: pdb/1TSR.pdb
    chain: B
    description: "p53 core domain + DNA (Cho et al. 1994)"

  oligomer:
    pdb: pdb/2J0Z.pdb
    chains: [A, B, C, D]
    description: "p53 tetramerization domain (NMR, MODEL 1)"

  coupled_folding:
    - pdb: pdb/1YCR.pdb
      partner: MDM2
      reference: "Kussie et al. Science 1996"
    - pdb: pdb/5HPD.pdb
      partner: CBP_TAZ2
      reference: "Krois et al. PNAS 2016"
    - pdb: pdb/5HOU.pdb
      partner: CBP_TAZ1
      reference: "Krois et al. PNAS 2016"
    - pdb: pdb/2L14.pdb
      partner: CBP_NCBD
      reference: "Lee et al. JMB 2010"
    - pdb: pdb/2K8F.pdb
      partner: p300_TAZ2_TAD1
      reference: "Feng et al. Structure 2009"
    - pdb: pdb/2MZD.pdb
      partner: p300_TAZ2_TAD2
      reference: "Miller Jenkins et al. Biochemistry 2015"

# ═══════════════════════════════════════════════════════════════
# Domain ranges
# ═══════════════════════════════════════════════════════════════
domains:
  core: [94, 289]
  tet:  [325, 356]

# ═══════════════════════════════════════════════════════════════
# Intrinsically Disordered Region (IDR) ranges
# ═══════════════════════════════════════════════════════════════
idr_ranges:
  TAD1:   [1, 40]
  TAD2:   [41, 61]
  PRD:    [62, 93]
  Linker: [290, 324]
  CTD:    [357, 393]

