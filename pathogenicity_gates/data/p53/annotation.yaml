# ═══════════════════════════════════════════════════════════════
# SLiM (Short Linear Motif) definitions
# ═══════════════════════════════════════════════════════════════
# IMPORTANT: WT amino acids are NOT written here.
#   'critical_aromatic_positions' and 'critical_charged_positions' are
#   position lists only; WT identity is read from p53_sequence.json.
slim_defs:
  MDM2_binding:
    range: [17, 29]
    type: coupled_folding_helix
  BOX_I:
    range: [13, 23]
    type: protein_interaction
  BOX_II:
    range: [41, 55]
    type: protein_interaction
    critical_aromatic_positions: [53, 54]
  BOX_V_PRD:
    range: [66, 93]
    type: sh3_polyproline
  NLS1:
    range: [305, 306]
    type: signal_peptide
    critical_charged_positions: [305, 306]
  NLS2:
    range: [369, 375]
    type: signal_peptide
    critical_charged_positions: [370, 372, 373]
  NLS3:
    range: [379, 384]
    type: signal_peptide
    critical_charged_positions: [379]
  CT_reg:
    range: [363, 393]
    type: regulatory_tail

# ═══════════════════════════════════════════════════════════════
# Special position sets
# ═══════════════════════════════════════════════════════════════
benign_pro_poly: [72]  # rs1042522 (P72R/A/H known polymorphism)

